services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homiq-product-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - homiq-product-network
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: homiq-product-nginx
    restart: unless-stopped
    ports:
      - "8002:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - homiq-product-network
    depends_on:
      - app

  postgres:
    image: postgres:15
    container_name: homiq-product-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: homiq_product_db
      POSTGRES_USER: homiq_user
      POSTGRES_PASSWORD: secret123
    volumes:
      - product-postgres-data:/var/lib/postgresql/data
    networks:
      - homiq-product-network

networks:
  homiq-product-network:
    driver: bridge

volumes:
  product-postgres-data:
